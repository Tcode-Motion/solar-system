<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milky Way Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; color: white; }
        
        .ui-layer {
            position: absolute; width: 100%; height: 100%; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: 10;
        }

        h1 { font-size: 3.5rem; letter-spacing: 12px; margin-bottom: 60px; text-shadow: 0 0 20px #007bff; text-align: center; }

        .container { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }

        .glass-card {
            width: 280px; padding: 40px; border-radius: 20px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; text-decoration: none; color: white;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            transform: translateY(-20px) scale(1.05);
            background: rgba(255, 255, 255, 0.1);
            border-color: #007bff; box-shadow: 0 0 40px rgba(0, 123, 255, 0.4);
        }

        h2 { font-size: 1.5rem; margin-bottom: 15px; }
        p { font-size: 0.85rem; color: #ccc; line-height: 1.6; margin-bottom: 25px; }

        .btn {
            padding: 10px 25px; border: 1px solid #007bff; border-radius: 30px;
            text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px;
            transition: 0.3s;
        }

        .glass-card:hover .btn { background: #007bff; box-shadow: 0 0 15px #007bff; }
    </style>
</head>
<body>

    <div class="ui-layer">
        <h1>MILKY WAY SYSTEMS</h1>
        <div class="container">
            <a href="./v1/index.html" class="glass-card">
                <h2 style="color: #fff;">V1: EXPEDITION</h2>
                <p>High-Fidelity 8K Textures<br>Full Geometric Complexity<br>Recommended for PC</p>
                <div class="btn">Launch V1</div>
            </a>

            <a href="./v2/index.html" class="glass-card">
                <h2 style="color: #00ffcc;">V2: LIGHTSPEED</h2>
                <p>Performance Optimized<br>Fast Transit Times<br>Mobile & Tablet Ready</p>
                <div class="btn">Launch V2</div>
            </a>
        </div>
    </div>

    <script>
        // Three.js Animated Starfield
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 1;
        camera.rotation.x = Math.PI/2;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const starGeo = new THREE.BufferGeometry();
        const starCount = 6000;
        const posArray = new Float32Array(starCount * 3);

        for(let i=0; i < starCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 600;
        }

        starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 });
        const starMesh = new THREE.Points(starGeo, starMaterial);
        scene.add(starMesh);

        function animate() {
            starMesh.rotation.y += 0.0008;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
