<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milky Way Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; color: white; }
        canvas { position: fixed; top: 0; left: 0; }
        .ui { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.8) 90%); }
        h1 { font-size: clamp(2rem, 8vw, 4rem); letter-spacing: 15px; margin-bottom: 40px; text-shadow: 0 0 20px #007bff; }
        .btn-group { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        .card { width: 260px; padding: 40px; border-radius: 20px; background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); text-decoration: none; color: white; transition: 0.4s; text-align: center; }
        .card:hover { transform: translateY(-15px); border-color: #007bff; box-shadow: 0 0 40px rgba(0, 123, 255, 0.4); background: rgba(0, 123, 255, 0.1); }
        h2 { font-size: 1.4rem; margin: 0 0 10px 0; }
        p { font-size: 0.8rem; color: #aaa; line-height: 1.5; }
        .v2-title { color: #00ffcc; }
    </style>
</head>
<body>
    <div class="ui">
        <h1>CELESTIAL GATE</h1>
        <div class="btn-group">
            <a href="./v1/index.html" class="card">
                <h2>V1: EXPEDITION</h2>
                <p>8K Resolution Textures<br>Full Physics Models<br>For PC / High-End</p>
            </a>
            <a href="./v2/index.html" class="card">
                <h2 class="v2-title">V2: MOBILE</h2>
                <p>Optimized Textures<br>Fast Load Times<br>Mobile Friendly</p>
            </a>
        </div>
    </div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const starGeo = new THREE.BufferGeometry();
        const starCount = 8000;
        const posArray = new Float32Array(starCount * 3);
        for(let i=0; i<starCount * 3; i++) { posArray[i] = (Math.random() - 0.5) * 1000; }
        starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.8});
        const starMesh = new THREE.Points(starGeo, starMat);
        scene.add(starMesh);
        camera.position.z = 5;

        function animate() {
            starMesh.rotation.y += 0.001;
            starMesh.rotation.x += 0.0005;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
        window.onresize = () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        }
    </script>
</body>
</html>
