<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milky Way Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; color: white; }
        .overlay {
            position: absolute; width: 100%; height: 100%; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, transparent 0%, rgba(0,0,0,0.8) 100%);
        }
        h1 { font-size: 3.5rem; letter-spacing: 15px; margin-bottom: 50px; text-align: center; color: #fff; text-shadow: 0 0 30px #007bff; }
        .card-container { display: flex; gap: 50px; flex-wrap: wrap; justify-content: center; }
        .card {
            width: 300px; padding: 40px; border-radius: 25px;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; text-decoration: none; color: white;
            transition: 0.5s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .card:hover {
            transform: translateY(-20px); border-color: #007bff;
            background: rgba(0, 123, 255, 0.1); box-shadow: 0 0 50px rgba(0, 123, 255, 0.4);
        }
        h2 { margin: 0; font-size: 1.8rem; letter-spacing: 2px; }
        p { font-size: 0.9rem; color: #bbb; line-height: 1.6; }
        .glow-v1 { text-shadow: 0 0 10px #fff; }
        .glow-v2 { color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
    </style>
</head>
<body>
    <div class="overlay">
        <h1>CELESTIAL GATE</h1>
        <div class="card-container">
            <a href="./v1/index.html" class="card">
                <h2 class="glow-v1">V1: HIGH-RES</h2>
                <p>PC & Desktop Optimized<br>Full Milky Way Detail<br>8K Planetary Textures</p>
            </a>
            <a href="./v2/index.html" class="card">
                <h2 class="glow-v2">V2: MOBILE</h2>
                <p>Performance Mode<br>Fast Galactic Transit<br>Optimized for Browsers</p>
            </a>
        </div>
    </div>

    <script>
        let scene, camera, renderer, stars;
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 1; camera.rotation.x = Math.PI/2;
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            let starGeo = new THREE.BufferGeometry();
            let positions = [];
            for(let i=0; i<6000; i++) {
                positions.push(Math.random()*600 - 300, Math.random()*600 - 300, Math.random()*600 - 300);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            let starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 });
            stars = new THREE.Points(starGeo, starMaterial);
            scene.add(stars);
            animate();
        }
        function animate() {
            stars.rotation.y += 0.001;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        init();
    </script>
</body>
</html>
